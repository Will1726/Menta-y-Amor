<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menta y Amor</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#c8f7d4,#e9fff2);
}

/* PANTALLA BIENVENIDA */

.bienvenida{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#27ae60,#6ee7a8);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
z-index:10;
}

.bienvenida h1{
font-size:60px;
}

.bienvenida button{
padding:15px 30px;
font-size:20px;
background:white;
color:#27ae60;
border:none;
border-radius:10px;
cursor:pointer;
}

/* HEADER */

header{
background:#1e8449;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:24px;
font-weight:bold;
}

.carrito-btn{
font-size:24px;
cursor:pointer;
}

/* PRODUCTOS */

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:40px;
padding:40px;
}

.producto{
background:white;
padding:20px;
border-radius:15px;
width:260px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.producto img{
width:180px;
}

button{
background:#2ecc71;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
margin:5px;
}

button:hover{
background:#27ae60;
}

/* PANTALLA CARRITO */

.pantalla-carrito{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:none;
flex-direction:column;
padding:30px;
overflow:auto;
}

.item{
display:flex;
justify-content:space-between;
background:#f4fff7;
padding:12px;
margin:10px 0;
border-radius:8px;
}

.total{
font-size:22px;
font-weight:bold;
margin-top:20px;
}

.eliminar{
background:#e74c3c;
}

</style>

</head>

<body>

<!-- BIENVENIDA -->

<div class="bienvenida" id="bienvenida">

<h1>🌿 Menta y Amor</h1>

<p>Bienvenido, gracias por visitar Menta y Amor</p>

<button onclick="entrar()">Entrar a la tienda</button>

</div>

<!-- HEADER -->

<header>

<div class="logo">🌿 Menta y Amor</div>

<div class="carrito-btn" onclick="abrirCarrito()">🛒</div>

</header>

<!-- PRODUCTOS -->

<div class="container">

<div class="producto">

<h3>Aromatizante 30ml</h3>

<img src="producto30ml.png">

<p>$50 MXN</p>

<button onclick="agregar('Aromatizante 30ml',50)">
Agregar
</button>

</div>

<div class="producto">

<h3>Aromatizante 1 Litro</h3>

<img src="producto1l.png">

<p>$150 MXN</p>

<button onclick="agregar('Aromatizante 1 Litro',150)">
Agregar
</button>

</div>

</div>

<!-- PANTALLA CARRITO -->

<div class="pantalla-carrito" id="pantallaCarrito">

<h2>🛒 Tu carrito</h2>

<div id="lista"></div>

<div class="total" id="total"></div>

<br>

<button onclick="cerrarCarrito()">Volver a la tienda</button>

</div>

<script>

let carrito=[];

function entrar(){
document.getElementById("bienvenida").style.display="none";
}

function agregar(nombre,precio){

carrito.push({nombre,precio});

alert("Producto agregado al carrito");

}

function abrirCarrito(){

let agrupados={};

carrito.forEach(p=>{

if(!agrupados[p.nombre]){

agrupados[p.nombre]={precio:p.precio,cantidad:0};

}

agrupados[p.nombre].cantidad++;

});

let lista=document.getElementById("lista");

lista.innerHTML="";

let total=0;

for(let producto in agrupados){

let info=agrupados[producto];

let subtotal=info.precio*info.cantidad;

total+=subtotal;

lista.innerHTML+=`

<div class="item">

<div>

${producto} x${info.cantidad}<br>

$${info.precio} c/u

</div>

<button class="eliminar"
onclick="eliminar('${producto}')">❌</button>

</div>

`;

}

document.getElementById("total").innerHTML=
"Total: $"+total+" MXN";

document.getElementById("pantallaCarrito").style.display="flex";

}

function cerrarCarrito(){

document.getElementById("pantallaCarrito").style.display="none";

}

function eliminar(nombre){

carrito=carrito.filter(p=>p.nombre!==nombre);

abrirCarrito();

}

</script>

</body>
</html>
